{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <h1>Dashboard</h1>
</div>
<div class="cards">
  <div class="card metric-card"><div class="metric-label">Tổng CH</div><div class="num">{{ total }}</div></div>
  {% for s in ['UP','WAN_DOWN','TUNNEL_DOWN','DOWN','UNKNOWN'] %}
  <div class="card metric-card"><div class="metric-label">{{ s }}</div><div class="num status-{{s}}">{{ status_counts.get(s,0) }}</div></div>
  {% endfor %}
</div>
<h2>100 cửa hàng đầu</h2>
{% include 'store_table.html' %}
{% endblock %}
