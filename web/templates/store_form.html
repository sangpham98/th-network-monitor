{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <h1>{{ title }}</h1>
</div>

{% if errors %}
<div class="alert">
  <strong>Lỗi:</strong>
  <ul>
    {% for error in errors %}<li>{{ error }}</li>{% endfor %}
  </ul>
</div>
{% endif %}

<section class="card">
  <form class="stack-form" method="post" action="{{ form_action }}">
    <div class="form-grid">
      <label class="field">
        <span>Mã CH</span>
        {% if store_code_readonly %}
        <strong>{{ form.store_code }}</strong>
        {% else %}
        <input name="store_code" value="{{ form.store_code or '' }}" required placeholder="70000xxx">
        {% endif %}
      </label>
      <label class="field"><span>PC Name</span><input name="pc_name" value="{{ form.pc_name or '' }}"></label>
      <label class="field"><span>IP Local</span><input name="ip_local" value="{{ form.ip_local or '' }}" placeholder="192.168.x.x"></label>
      <label class="field"><span>IP Tunnel</span><input name="ip_tunnel" value="{{ form.ip_tunnel or '' }}" placeholder="10.x.x.x"></label>
      <label class="field"><span>WAN DNS</span><input name="wan_dns" value="{{ form.wan_dns or '' }}"></label>
      <label class="field"><span>Miền</span><input name="region" value="{{ form.region or '' }}"></label>
      <label class="field"><span>Khu vực</span><input name="area" value="{{ form.area or '' }}"></label>
      <label class="field field-full"><span>Địa chỉ</span><textarea name="address" rows="3">{{ form.address or '' }}</textarea></label>
      <label class="check-field"><input type="checkbox" name="enabled" value="1" {% if form.enabled %}checked{% endif %}> Monitor store này</label>
    </div>
    <div class="toolbar action-bar">
      <button class="btn" type="submit">Lưu</button>
      <a class="btn btn-secondary" href="{{ cancel_url }}">Hủy</a>
    </div>
  </form>
</section>
{% endblock %}
