<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TH Network Monitor</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="nav">
    <strong>TH Network Monitor</strong>
    {% if current_user %}
    <a href="/">Dashboard</a>
    <a href="/stores">Stores</a>
    <a href="/import">Import Excel</a>
    <a href="/incidents">Incidents</a>
    <a href="/backups">Backups</a>
    <form method="post" action="/monitor/run-once"><button class="btn">Check now</button></form>
    <span class="hint">{{ current_user }}</span>
    <form method="post" action="/logout"><button class="btn">Logout</button></form>
    {% endif %}
  </div>
  <main class="wrap">{% block content %}{% endblock %}</main>
</body>
</html>
