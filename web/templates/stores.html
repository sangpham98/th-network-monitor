{% extends 'base.html' %}{% block content %}<h1>Stores</h1>{% if request.query_params.get('deleted') == '1' %}<div class="card">Đã xóa store.</div>{% endif %}<form class="toolbar" method="get"><input name="q" value="{{ q }}" placeholder="Mã CH / PC / IP / Khu vực"><select name="status"><option value="">Tất cả Overall</option>{% for s in ['UP','WAN_DOWN','TUNNEL_DOWN','DOWN','UNKNOWN'] %}<option value="{{s}}" {% if status==s %}selected{% endif %}>Overall: {{s}}</option>{% endfor %}</select><button class="btn">Lọc</button></form>{% set show_delete = true %}{% include 'store_table.html' %}{% endblock %}
